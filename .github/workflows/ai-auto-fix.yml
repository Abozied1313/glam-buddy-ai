name: Cleanup & Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint 2>&1 || true

      - name: Build project
        run: npm run build

      - name: Check for secrets
        run: |
          if grep -r "REPLICATE_API_TOKEN\|SUPABASE_KEY" src/ --include="*.ts" --include="*.tsx" --include="*.js"; then
            echo "❌ ERROR: Secrets found in source code!"
            exit 1
          else
            echo "✅ No secrets found in source code"
          fi

      - name: Validate .gitignore
        run: |
          if grep -q "^\.env$" .gitignore; then
            echo "✅ .env is properly ignored"
          else
            echo "❌ ERROR: .env is not in .gitignore"
            exit 1
          fi
